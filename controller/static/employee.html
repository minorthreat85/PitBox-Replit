<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Employee Control – PitBox</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --border: #333; --accent: #FF0000; --text: #fff; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }
        .top-bar .left, .top-bar .right { min-width: 44px; min-height: 44px; display: flex; align-items: center; }
        .top-bar .right { justify-content: flex-end; }
        .top-bar .center { flex: 1; text-align: center; font-weight: 600; font-size: 1rem; }
        .top-bar a, .top-bar button {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px 12px;
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .top-bar a:active, .top-bar button:active { opacity: 0.8; }
        .main { padding: 16px; max-width: 480px; margin: 0 auto; }
        .sim-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (min-width: 420px) {
            .sim-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .sim-card {
            min-height: 92px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-tap-highlight-color: transparent;
        }
        .sim-card:active { border-color: var(--accent); }
        .sim-card .name { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .sim-card .dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0;
        }
        .sim-card .dot.online { background: #2ecc71; }
        .sim-card .dot.offline { background: var(--muted); }
        .sim-card .pill { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); margin-top: 6px; display: inline-block; }
        .sim-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 6px; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            align-items: flex-end;
        }
        .sheet-overlay.open { display: flex; }
        .sheet {
            width: 100%;
            max-height: 85vh;
            background: var(--card);
            border-radius: 20px 20px 0 0;
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .sheet-header .title { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .sheet-header .close {
            width: 44px; height: 44px;
            border: none;
            background: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sheet-body { padding: 20px; overflow-y: auto; flex: 1; }
        .sheet .offline-msg { color: var(--muted); padding: 12px 0; }
        .pill-toggle {
            display: flex;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .pill-toggle button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            min-height: 48px;
        }
        .pill-toggle button.active { background: var(--accent); color: #fff; }
        .pill-toggle button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pill-toggle .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-big {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            min-height: 48px;
            margin-bottom: 12px;
        }
        .btn-big.primary { background: var(--accent); color: #fff; }
        .btn-big.secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--border); }
        .btn-big:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast {
            position: fixed;
            bottom: calc(24px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            z-index: 200;
            max-width: 90%;
            display: none;
        }
        .toast.show { display: block; animation: fadeIn 0.2s ease; }
        .toast.success { background: #2ecc71; color: #fff; }
        .toast.error { background: #c0392b; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #refresh-btn { min-height: 44px; padding: 10px 16px; }
        .sheet-info-block { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .info-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--muted); flex-shrink: 0; margin-right: 12px; }
        .info-val { color: var(--text); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
        .info-val--running { color: #2ecc71; font-weight: 600; }
        .info-val--stopped { color: var(--muted); }
    </style>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <header class="top-bar">
        <div class="left"><a href="/" id="back-link">← Back to Pit</a></div>
        <div class="center">Employee Control</div>
        <div class="right">
            <button type="button" id="logout-btn" aria-label="Logout">Logout</button>
        </div>
    </header>
    <main class="main">
        <div class="toolbar" style="margin-bottom:12px;display:flex;align-items:center;justify-content:flex-end;">
            <button type="button" id="refresh-btn" class="btn-big secondary" style="max-width:160px;">Refresh</button>
        </div>
        <div id="sim-grid" class="sim-grid"></div>
    </main>
    <div id="sheet-overlay" class="sheet-overlay" role="dialog" aria-modal="true" aria-label="Sim controls">
        <div class="sheet">
            <div class="sheet-header">
                <span class="title"><span id="sheet-name">—</span> <span id="sheet-dot" class="dot offline"></span></span>
                <button type="button" class="close" id="sheet-close" aria-label="Close">×</button>
            </div>
            <div class="sheet-body">
                <p id="sheet-offline-msg" class="offline-msg" style="display:none;">Sim offline. Controls disabled.</p>
                <div id="sheet-info"></div>
                <div id="sheet-controls">
                    <p style="margin-bottom:8px;font-size:0.85rem;color:var(--muted);">Drive mode (Ctrl+G)</p>
                    <div class="pill-toggle" id="pill-toggle">
                        <button type="button" id="pill-auto" data-mode="AUTO">AUTO</button>
                        <button type="button" id="pill-manual" data-mode="MANUAL">MANUAL</button>
                    </div>
                    <button type="button" id="btn-back-pits" class="btn-big primary">Back to Pits (Ctrl+P)</button>
                    <div style="margin-top:16px;display:flex;gap:8px;">
                        <button type="button" id="sheet-refresh-btn" class="btn-big secondary" style="flex:1;">Refresh status</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast" role="status"></div>
    <script src="/employee.js"></script>
</body>
</html>
