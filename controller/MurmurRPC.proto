// Murmur RPC gRPC interface (Mumble 1.4+)
// Minimal subset for PitBox: channels, users, mute, move, kick.
// Based on the official Mumble MurmurRPC.proto spec.

syntax = "proto3";

package MurmurRPC;

option java_package = "net.mumble.proto";

// ── Basic message types ────────────────────────────────────────────────────

message Void {}

message Version {
  uint32 version_v1 = 1;
  string release = 2;
  string os = 3;
  string os_version = 4;
}

message Uptime {
  uint64 secs = 1;
}

message Server {
  uint32 id = 1;
  optional bool running = 2;
  optional Uptime uptime = 3;
}

message Server_List {
  repeated Server servers = 1;
}

message Channel {
  optional Server server = 1;
  optional uint32 id = 2;
  optional Channel parent = 3;
  optional string name = 4;
  optional string description = 5;
  optional bool temporary = 6;
  optional int32 position = 7;
  repeated Channel links = 8;
}

message Channel_List {
  repeated Channel channels = 1;
}

message User {
  optional Server server = 1;
  optional uint32 session = 2;
  optional uint32 id = 3;
  optional string name = 4;
  optional bool mute = 5;
  optional bool deaf = 6;
  optional bool suppress = 7;
  optional bool self_mute = 8;
  optional bool self_deaf = 9;
  optional bool recording = 10;
  optional bool priority_speaker = 11;
  optional Channel channel = 12;
  optional string comment = 13;
  optional string texture_hash = 14;
  optional bytes texture = 15;
  optional string hash = 16;
  optional string address = 17;
  optional bool online = 18;
  optional uint64 bytes_per_sec = 19;
  optional uint32 tcp_ping_ms = 20;
  optional float udp_ping_ms = 21;
  optional uint32 udp_packets = 22;
  optional uint32 tcp_packets = 23;
}

message User_List {
  repeated User users = 1;
}

message Tree {
  optional Channel channel = 1;
  repeated User users = 2;
  repeated Tree children = 3;
}

message User_KickBan {
  optional Server server = 1;
  optional User user = 2;
  optional User actor = 3;
  optional string reason = 4;
  optional bool ban = 5;
}

message TextMessage {
  optional Server server = 1;
  optional uint32 id = 2;
  optional User actor = 3;
  repeated User users = 4;
  repeated Channel channels = 5;
  repeated Channel trees = 6;
  optional string text = 7;
}

message Log {
  optional Server server = 1;
  optional int64 timestamp = 2;
  optional string text = 3;
}

message Log_List {
  repeated Log log = 1;
  optional uint32 min = 2;
  optional uint32 max = 3;
}

message Config {
  optional Server server = 1;
  map<string, string> fields = 2;
  optional string key = 3;
  optional string value = 4;
}

message Config_List {
  map<string, string> defaults = 1;
}

message Database_User {
  optional Server server = 1;
  optional uint32 id = 2;
  optional string name = 3;
  optional string email = 4;
  optional string comment = 5;
  optional string hash = 6;
  optional string password = 7;
  optional string last_channel = 8;
  optional string texture = 9;
  optional int64 last_active = 10;
}

message Database_User_List {
  repeated Database_User users = 1;
}

message Ban {
  optional Server server = 1;
  optional bytes address = 2;
  optional uint32 bits = 3;
  optional string name = 4;
  optional string hash = 5;
  optional string reason = 6;
  optional int64 start = 7;
  optional uint32 duration_secs = 8;
}

message Ban_List {
  optional Server server = 1;
  repeated Ban bans = 2;
}

message AuthenticatorStream {
  message Initialize {
    optional Server server = 1;
  }
  message Password_Request {
    optional uint32 id = 1;
    optional string name = 2;
    optional string password = 3;
    repeated string certificates = 4;
    optional string certificate_hash = 5;
    optional bool strong_certificate = 6;
  }
  message Response {
    optional uint32 id = 1;
    optional bool allow = 2;
    optional bool is_admin = 3;
    optional string name = 4;
    repeated string groups = 5;
  }
  oneof request {
    Initialize initialize = 1;
    Response response = 2;
  }
  oneof query {
    Password_Request password_request = 3;
  }
}

message Event {
  enum Type {
    ServerStarted = 0;
    ServerStopped = 1;
    UserConnected = 2;
    UserDisconnected = 3;
    UserStateChanged = 4;
    UserTextMessage = 5;
    ChannelCreated = 6;
    ChannelRemoved = 7;
    ChannelStateChanged = 8;
  }
  optional Server server = 1;
  optional Type type = 2;
  optional User user = 3;
  optional TextMessage message = 4;
  optional Channel channel = 5;
}

// ── Service definition ─────────────────────────────────────────────────────

service V1 {
  rpc GetUptime(Void) returns (Uptime);
  rpc GetVersion(Void) returns (Version);
  rpc Events(Void) returns (stream Event);

  rpc ServerCreate(Void) returns (Server);
  rpc ServerQuery(Void) returns (Server_List);
  rpc ServerGet(Server) returns (Server);
  rpc ServerStart(Server) returns (Void);
  rpc ServerStop(Server) returns (Void);
  rpc ServerRemove(Server) returns (Void);
  rpc ServerEvents(Server) returns (stream Event);

  rpc GetAllChannels(Server) returns (Channel_List);
  rpc ChannelGet(Channel) returns (Channel);
  rpc ChannelAdd(Channel) returns (Channel);
  rpc ChannelRemove(Channel) returns (Void);
  rpc ChannelUpdate(Channel) returns (Channel);
  rpc ChannelQuery(Channel) returns (Channel_List);

  rpc GetAllUsers(Server) returns (User_List);
  rpc UserGet(User) returns (User);
  rpc UserUpdate(User) returns (User);
  rpc UserKick(User_KickBan) returns (Void);

  rpc GetTree(Server) returns (Tree);

  rpc SendMessage(TextMessage) returns (Void);

  rpc GetBans(Server) returns (Ban_List);
  rpc SetBans(Ban_List) returns (Void);

  rpc GetLogs(Log) returns (Log_List);

  rpc GetConfig(Server) returns (Config_List);
  rpc GetConfigField(Config) returns (Config);
  rpc SetConfigField(Config) returns (Void);
  rpc ResetConfigField(Config) returns (Void);

  rpc GetUsers(Server) returns (User_List);
  rpc GetDatabaseUsers(Server) returns (Database_User_List);
  rpc GetDatabaseUser(Database_User) returns (Database_User);
  rpc UpdateDatabaseUser(Database_User) returns (Void);
  rpc RegisterDatabaseUser(Database_User) returns (Database_User);
  rpc DeregisterDatabaseUser(Database_User) returns (Void);
  rpc VerifyPassword(Database_User) returns (Database_User);
  rpc FindDatabaseUser(Database_User) returns (Database_User);
}
